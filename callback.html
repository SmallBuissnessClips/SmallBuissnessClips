<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MetaClips — TikTok Sign-in</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f10;
    color: #f2f2f2;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .card {
    text-align: center;
    padding: 48px 56px;
    border-radius: 16px;
    background: #18181a;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    max-width: 420px;
  }
  .icon {
    font-size: 56px;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 12px;
  }
  p {
    font-size: 15px;
    line-height: 1.5;
    color: #b5b5b8;
    margin: 0;
  }
  .accent {
    color: #25f4ee;
  }
  .fail .accent {
    color: #ff4d4f;
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Finishing up…</h1>
    <p id="message">Reading the response from TikTok.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const errorDescription = params.get('error_description');
    const code = params.get('code');

    const card    = document.getElementById('card');
    const icon    = document.getElementById('icon');
    const title   = document.getElementById('title');
    const message = document.getElementById('message');

    if (error) {
      card.classList.add('fail');
      icon.textContent = '✖';
      title.innerHTML = 'Authorization <span class="accent">failed</span>';
      message.textContent = (errorDescription || error) + ' — check your terminal for the full error.';
    } else if (code) {
      icon.textContent = '✔';
      title.innerHTML = 'You\'re <span class="accent">signed in</span>';
      message.textContent = 'Check your terminal — it\'s finishing setup now. You can close this tab.';
      setTimeout(() => window.close(), 2500);
    } else {
      icon.textContent = '?';
      title.textContent = 'No response data found';
      message.textContent = 'This page did not receive a code or error from TikTok. Check your terminal.';
    }
  </script>
</body>
</html>
