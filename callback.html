<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MetaClips — TikTok Sign-in</title>
<style>
  html, body {
    min-height: 100%;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f10;
    color: #f2f2f2;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
    box-sizing: border-box;
  }
  .card {
    text-align: center;
    padding: 40px 48px;
    border-radius: 16px;
    background: #18181a;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    max-width: 560px;
    width: 100%;
  }
  .icon {
    font-size: 48px;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 12px;
  }
  p {
    font-size: 15px;
    line-height: 1.5;
    color: #b5b5b8;
    margin: 0 0 20px;
  }
  .accent {
    color: #25f4ee;
  }
  .fail .accent {
    color: #ff4d4f;
  }
  textarea {
    width: 100%;
    box-sizing: border-box;
    background: #0f0f10;
    color: #f2f2f2;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 12px;
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 13px;
    resize: none;
    margin-bottom: 14px;
  }
  button {
    background: #25f4ee;
    color: #0f0f10;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:active {
    transform: translateY(1px);
  }
  .copied {
    color: #25f4ee;
    font-size: 13px;
    margin-top: 10px;
    height: 16px;
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Reading response…</h1>
    <p id="message">One second.</p>
    <textarea id="box" rows="3" readonly></textarea>
    <button id="copyBtn">Copy</button>
    <div class="copied" id="copied"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const errorDescription = params.get('error_description');
    const code = params.get('code');

    const card    = document.getElementById('card');
    const icon    = document.getElementById('icon');
    const title   = document.getElementById('title');
    const message = document.getElementById('message');
    const box     = document.getElementById('box');
    const copyBtn = document.getElementById('copyBtn');
    const copied  = document.getElementById('copied');

    // The terminal script just needs the full URL — it re-parses code/state/error itself.
    box.value = window.location.href;

    if (error) {
      card.classList.add('fail');
      icon.textContent = '✖';
      title.innerHTML = 'Authorization <span class="accent">failed</span>';
      message.textContent = (errorDescription || error) + ' — copy the URL below into your terminal anyway, it will show the full error.';
    } else if (code) {
      icon.textContent = '✔';
      title.innerHTML = 'Copy this into your <span class="accent">terminal</span>';
      message.textContent = 'Paste the text below into the terminal window running tiktok-auth.js, then press Enter.';
    } else {
      icon.textContent = '?';
      title.textContent = 'No response data found';
      message.textContent = 'This page did not receive a code or error from TikTok.';
    }

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(box.value);
      } catch {
        box.select();
        document.execCommand('copy');
      }
      copied.textContent = 'Copied!';
      setTimeout(() => { copied.textContent = ''; }, 2000);
    });

    // Best-effort: select the text automatically so a manual copy is one click away
    box.focus();
    box.select();
  </script>
</body>
</html>
